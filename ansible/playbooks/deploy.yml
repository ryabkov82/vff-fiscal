---
- name: Deploy vff-fiscal service and SHM adapter
  hosts: vff_fiscal
  serial: 1
  gather_facts: true
  tasks:
    - name: Deploy service and adapter with deployment lock
      block:
        - name: Acquire deployment lock
          ansible.builtin.include_role:
            name: vff_fiscal_common
            tasks_from: acquire_deploy_lock.yml
          vars:
            vff_fiscal_common_deploy_lock_operation: deploy

        - name: Run common deployment preparation
          ansible.builtin.include_role:
            name: vff_fiscal_common

        - name: Deploy service
          ansible.builtin.include_role:
            name: vff_fiscal_service

        - name: Deploy adapter
          ansible.builtin.include_role:
            name: vff_fiscal_adapter

      always:
        - name: Release deployment lock
          ansible.builtin.include_role:
            name: vff_fiscal_common
            tasks_from: release_deploy_lock.yml

    - name: Report deployment status
      ansible.builtin.include_role:
        name: vff_fiscal_status
