---
- name: Deploy vff-fiscal service only
  hosts: vff_fiscal
  serial: 1
  gather_facts: true
  tasks:
    - name: Deploy service with deployment lock
      block:
        - name: Acquire deployment lock
          ansible.builtin.include_role:
            name: vff_fiscal_common
            tasks_from: acquire_deploy_lock.yml
          vars:
            vff_fiscal_common_deploy_lock_operation: deploy-service

        - name: Run common deployment preparation
          ansible.builtin.include_role:
            name: vff_fiscal_common

        - name: Deploy service
          ansible.builtin.include_role:
            name: vff_fiscal_service

      always:
        - name: Release deployment lock
          ansible.builtin.include_role:
            name: vff_fiscal_common
            tasks_from: release_deploy_lock.yml
