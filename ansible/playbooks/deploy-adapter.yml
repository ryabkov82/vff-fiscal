---
- name: Deploy SHM adapter only
  hosts: vff_fiscal
  serial: 1
  gather_facts: true
  tasks:
    - name: Deploy adapter with deployment lock
      block:
        - name: Acquire deployment lock
          ansible.builtin.include_role:
            name: vff_fiscal_common
            tasks_from: acquire_deploy_lock.yml
          vars:
            vff_fiscal_common_deploy_lock_operation: deploy-adapter

        - name: Run common deployment preparation
          ansible.builtin.include_role:
            name: vff_fiscal_common

        - name: Deploy adapter
          ansible.builtin.include_role:
            name: vff_fiscal_adapter

      always:
        - name: Release deployment lock
          ansible.builtin.include_role:
            name: vff_fiscal_common
            tasks_from: release_deploy_lock.yml
