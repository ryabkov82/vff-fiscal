---
- name: Render deploy manifest payload
  ansible.builtin.template:
    src: deploy-state.json.j2
    dest: "{{ vff_fiscal_deploy_state_path }}.payload"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Atomically write deploy manifest
  ansible.builtin.shell: |
    set -euo pipefail
    python3 {{ vff_fiscal_deploy_tools_dir }}/write_manifest.py \
      < {{ vff_fiscal_deploy_state_path }}.payload
  environment:
    MANIFEST_PATH: "{{ vff_fiscal_deploy_state_path }}"
  changed_when: true
  no_log: true

- name: Remove deploy manifest payload file
  ansible.builtin.file:
    path: "{{ vff_fiscal_deploy_state_path }}.payload"
    state: absent
  no_log: true
