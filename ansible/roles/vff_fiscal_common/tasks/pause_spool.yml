---
- name: Detect whether SHM spool is paused
  ansible.builtin.command: docker inspect -f '{{ "{{" }}.State.Paused{{ "}}" }}' {{ shm_spool_container }}
  register: vff_fiscal_spool_paused_probe
  changed_when: false
  failed_when: false

- name: Pause SHM spool for cutover window
  ansible.builtin.command: docker pause {{ shm_spool_container }}
  changed_when: true
  when:
    - vff_fiscal_spool_paused_probe.rc == 0
    - vff_fiscal_spool_paused_probe.stdout != 'true'

- name: Record SHM spool pause action
  ansible.builtin.set_fact:
    vff_fiscal_spool_was_paused: "{{ vff_fiscal_spool_paused_probe.rc == 0 and vff_fiscal_spool_paused_probe.stdout != 'true' }}"

- name: Confirm SHM spool is paused
  ansible.builtin.command: docker inspect -f '{{ "{{" }}.State.Paused{{ "}}" }}' {{ shm_spool_container }}
  register: vff_fiscal_spool_paused_confirm
  changed_when: false
  failed_when: vff_fiscal_spool_paused_confirm.stdout != 'true'
  when: vff_fiscal_spool_was_paused | default(false) | bool
