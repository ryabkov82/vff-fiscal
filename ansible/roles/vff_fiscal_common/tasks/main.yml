---
- name: Validate requested deployment version
  ansible.builtin.assert:
    that:
      - vff_fiscal_version is defined
      - vff_fiscal_version is string
      - vff_fiscal_version is match('^[0-9a-f]{40}$')
    fail_msg: vff_fiscal_version must be an exact 40-character lowercase commit SHA.

- name: Report check mode limitations
  ansible.builtin.debug:
    msg: >-
      Check mode performs read-only preflight only. It skips git checkout, image
      builds, spool pauses, chattr changes, file copies, and manifest writes.
  when: ansible_check_mode | bool

- name: Check required host commands
  ansible.builtin.script: host_preflight.py
  changed_when: false

- name: Check Docker daemon availability
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - "{{ '{{' }}.ServerVersion{{ '}}' }}"
  changed_when: false

- name: Check docker compose availability
  ansible.builtin.command: docker compose version
  changed_when: false

- name: Check Docker network exists
  ansible.builtin.command: docker network inspect {{ vff_fiscal_docker_network }}
  changed_when: false

- name: Check SHM container running state
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - -f
      - "{{ '{{' }}.State.Running{{ '}}' }}"
      - "{{ item }}"
  changed_when: false
  loop:
    - "{{ shm_core_container }}"
    - "{{ shm_spool_container }}"
  register: shm_container_running
  failed_when: shm_container_running.stdout != 'true'

- name: Collect SHM container paused state separately
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - -f
      - "{{ '{{' }}.State.Paused{{ '}}' }}"
      - "{{ item }}"
  changed_when: false
  loop:
    - "{{ shm_core_container }}"
    - "{{ shm_spool_container }}"
  register: shm_container_paused
  failed_when:
    - shm_container_paused.stdout != 'true'
    - shm_container_paused.stdout != 'false'

- name: Generate deployment timestamp fact
  ansible.builtin.set_fact:
    deploy_timestamp: "{{ ansible_date_time.iso8601_basic_short }}"
    deploy_short_sha: "{{ vff_fiscal_version[:12] }}"

- name: Ensure deployment directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ vff_fiscal_root }}", mode: "0755" }
    - { path: "{{ vff_fiscal_backup_root }}", mode: "0700" }
    - { path: "{{ vff_fiscal_deploy_tools_dir }}", mode: "0750" }
  when: not ansible_check_mode | bool

- name: Install common deployment helper scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ vff_fiscal_deploy_tools_dir }}/{{ item }}"
    mode: "0750"
    owner: root
    group: root
  loop:
    - validate_sha.py
    - spool_cutover_gate.py
    - write_manifest.py
    - run_shm_perl.py
    - shm_exec_preflight.py
    - adapter_idempotency.py
    - immutable_recovery.py
    - host_preflight.py
    - parse_lsattr.py
  when: not ansible_check_mode | bool

- name: Ensure application checkout directory exists
  ansible.builtin.file:
    path: "{{ vff_fiscal_app_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: not ansible_check_mode | bool

- name: Fetch remote main branch metadata
  ansible.builtin.command: >-
    git fetch --prune origin {{ vff_fiscal_git_default_ref | regex_replace('^origin/', '') }}
  args:
    chdir: "{{ vff_fiscal_app_dir }}"
  changed_when: false
  when: not ansible_check_mode | bool
  # noqa: command-instead-of-module

- name: Checkout exact repository revision
  ansible.builtin.git:
    repo: "{{ vff_fiscal_repo_url }}"
    dest: "{{ vff_fiscal_app_dir }}"
    version: "{{ vff_fiscal_version }}"
    update: true
    accept_hostkey: false
  when: not ansible_check_mode | bool

- name: Verify requested commit object exists
  ansible.builtin.command: git cat-file -t {{ vff_fiscal_version }}
  args:
    chdir: "{{ vff_fiscal_app_dir }}"
  register: vff_fiscal_git_object_type
  changed_when: false
  failed_when: vff_fiscal_git_object_type.stdout != 'commit'
  when: not ansible_check_mode | bool
  # noqa: command-instead-of-module

- name: Verify requested commit is reachable from origin main
  ansible.builtin.command: git merge-base --is-ancestor {{ vff_fiscal_version }} {{ vff_fiscal_git_default_ref }}
  args:
    chdir: "{{ vff_fiscal_app_dir }}"
  register: vff_fiscal_git_reachable
  changed_when: false
  failed_when: false
  when:
    - not ansible_check_mode | bool
    - not (vff_fiscal_allow_unreachable_commit | default(false) | bool)
# noqa: command-instead-of-module

- name: Reject commits not reachable from origin main
  ansible.builtin.fail:
    msg: >-
      {{ vff_fiscal_version }} is not reachable from {{ vff_fiscal_git_default_ref }}.
      Set vff_fiscal_allow_unreachable_commit=true only for an explicit exceptional deploy.
  when:
    - not ansible_check_mode | bool
    - not (vff_fiscal_allow_unreachable_commit | default(false) | bool)
    - vff_fiscal_git_reachable.rc != 0

- name: Verify checked out commit SHA
  ansible.builtin.command: git rev-parse HEAD
  args:
    chdir: "{{ vff_fiscal_app_dir }}"
  register: vff_fiscal_checked_out_sha
  changed_when: false
  when: not ansible_check_mode | bool
  # noqa: command-instead-of-module

- name: Assert checked out commit matches requested version
  ansible.builtin.assert:
    that:
      - vff_fiscal_checked_out_sha.stdout == vff_fiscal_version
    fail_msg: Server checkout HEAD does not match requested vff_fiscal_version.
  when: not ansible_check_mode | bool

- name: Detect uncommitted changes in server checkout
  ansible.builtin.command: git status --porcelain
  args:
    chdir: "{{ vff_fiscal_app_dir }}"
  register: vff_fiscal_git_status
  changed_when: false
  failed_when: vff_fiscal_git_status.stdout | length > 0
  when: not ansible_check_mode | bool
  # noqa: command-instead-of-module
